name: Social Media Automations — Bi-Weekly Digest

on:
  schedule:
    # 0 12 * * 3,6 runs at 12:00 PM UTC (which is 5:30 PM IST) on Wednesday (3) and Saturday (6)
    - cron: "0 12 * * 3,6"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  send-digest:
    name: Fetch & Send Digest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🤖 Run Automation Agent
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        run: node emailDigest.js
